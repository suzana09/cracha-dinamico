<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gerador de Crachá</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center">


    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 p-10">


        <!-- Formulário -->

        <div class="bg-white p-6 rounded-2xl shadow-xl">

            <h1 class="text-2xl font-bold mb-5">
                Gerador de Crachá
            </h1>


            <input 
            id="inputNome"
            type="text"
            placeholder="Digite seu nome"
            class="border p-3 w-full mb-4 rounded">


            <input 
            id="inputCargo"
            type="text"
            placeholder="Digite seu cargo"
            class="border p-3 w-full mb-4 rounded">


            <select 
            id="selecionarCor"
            class="border p-3 w-full rounded">


                <option value="blue">
                    Azul
                </option>


                <option value="green">
                    Verde
                </option>


                <option value="purple">
                    Roxo
                </option>


            </select>


        </div>



        <!-- Cartão -->

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden w-80">


            <div id="banner" class="h-32 bg-blue-500">

            </div>


            <div class="p-6 text-center">


                <img 
                src="https://i.pravatar.cc/150"
                class="w-32 h-32 rounded-full mx-auto -mt-20 border-4 border-white">


                <h2 id="cardNome" class="text-2xl font-bold mt-4">
                    Nome Padrão
                </h2>


                <p id="cardCargo" class="text-gray-600">
                    Cargo Padrão
                </p>


            </div>


        </div>


    </div>


    <script src="script.js"></script>


</body>

</html>
